<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Studio</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Georgia', 'serif'],
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // --- ICON COMPONENTS ---
    const Icon = ({ children, className = "w-5 h-5", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {children}
      </svg>
    );

    const LayoutDashboard = (p) => <Icon {...p}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></Icon>;
    const BookOpen = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
    const PenTool = (p) => <Icon {...p}><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></Icon>;
    const MessageSquare = (p) => <Icon {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Icon>;
    const FileText = (p) => <Icon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></Icon>;
    const StickyNote = (p) => <Icon {...p}><path d="M15.5 3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z"/><path d="M15 3v6h6"/></Icon>;
    const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
    const Sparkles = (p) => <Icon {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M3 5h4"/><path d="M19 17v4"/><path d="M17 19h4"/></Icon>;
    const Loader2 = (p) => <Icon {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Icon>;
    const Wand2 = (p) => <Icon {...p}><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/></Icon>;
    const ImageIcon = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></Icon>;
    const Volume2 = (p) => <Icon {...p}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></Icon>;
    const Square = (p) => <Icon {...p} fill={p.className?.includes('fill-current') ? 'currentColor' : 'none'}><rect width="18" height="18" x="3" y="3" rx="2"/></Icon>;
    const User = (p) => <Icon {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
    const Moon = (p) => <Icon {...p}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></Icon>;
    const Sun = (p) => <Icon {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></Icon>;
    const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
    const DatabaseZap = (p) => <Icon {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 15 21.84"/><path d="M21 5V8.46"/><path d="M3 12A9 3 0 0 0 14.59 14.97"/><path d="M13 21l5-8h-3l3-8"/></Icon>;
    const GitCommit = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><line x1="3" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="21" y2="12"/></Icon>;
    const List = (p) => <Icon {...p}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></Icon>;
    const Eye = (p) => <Icon {...p}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></Icon>;
    const Folder = (p) => <Icon {...p}><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></Icon>;
    const Upload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></Icon>;
    const Key = (p) => <Icon {...p}><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m21 2-9.6 9.6"/><circle cx="7.5" cy="15.5" r="5.5"/></Icon>;
    const Type = (p) => <Icon {...p}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></Icon>;
    const Target = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></Icon>;
    const Zap = (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>;
    const Tag = (p) => <Icon {...p}><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></Icon>;
    const BarChart = (p) => <Icon {...p}><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></Icon>;

    // --- MAIN COMPONENT ---
    function BookStudio() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [isDarkMode, setIsDarkMode] = useState(false);

      // --- NEW DASHBOARD HUB STATE ---
      const [dashboardContext, setDashboardContext] = useState('');
      
      const [deepInsights, setDeepInsights] = useState(null);
      const [isGeneratingInsights, setIsGeneratingInsights] = useState(false);
      
      const [titleStyle, setTitleStyle] = useState('Cinematic');
      const [advancedTitleData, setAdvancedTitleData] = useState(null);
      const [isGeneratingTitles, setIsGeneratingTitles] = useState(false);

      // --- EDITOR STATE ---
      const [editorText, setEditorText] = useState('');
      const [isWriting, setIsWriting] = useState(false);
      const [showRewriteMenu, setShowRewriteMenu] = useState(false);
      const [critiqueResult, setCritiqueResult] = useState('');
      const [isCritiquing, setIsCritiquing] = useState(false);
      
      // --- NOTES & TRANSCRIPTS STATE ---
      const [notes, setNotes] = useState([]);
      const [isBrainstorming, setIsBrainstorming] = useState(false);
      const [transcriptText, setTranscriptText] = useState('');
      const [isExtracting, setIsExtracting] = useState(false);

      // --- MULTIMEDIA / TTS / IMAGEN STATE ---
      const [isGeneratingImage, setIsGeneratingImage] = useState(false);
      const [generatedImage, setGeneratedImage] = useState(null);
      const [isSpeaking, setIsSpeaking] = useState(false);
      const audioRef = useRef(null);

      // --- WORKSHOP & SECRET STATE ---
      const [workshopCharacter, setWorkshopCharacter] = useState({ name: '', personality: '', secret: '' });
      const [workshopMessages, setWorkshopMessages] = useState([]);
      const [isWorkshopLoading, setIsWorkshopLoading] = useState(false);
      const [userInput, setUserInput] = useState('');
      const [isGeneratingSecret, setIsGeneratingSecret] = useState(false);
      const [isGeneratingName, setIsGeneratingName] = useState(false);

      // --- OUTLINER & TIMELINE STATE ---
      const [timelineInput, setTimelineInput] = useState('');
      const [timelineResult, setTimelineResult] = useState('');
      const [isGeneratingTimeline, setIsGeneratingTimeline] = useState(false);
      const [chapterInput, setChapterInput] = useState('');
      const [chaptersOutline, setChaptersOutline] = useState('');
      const [isGeneratingChapters, setIsGeneratingChapters] = useState(false);

      // --- LIBRARY STATE ---
      const [importedFiles, setImportedFiles] = useState([]);
      const [fileBlurbs, setFileBlurbs] = useState({});
      const [isGeneratingBlurb, setIsGeneratingBlurb] = useState(null);

      const [apiError, setApiError] = useState('');

      // --- THEME COLORS ---
      const gold = "text-[#c29b46]";
      const bgGold = "bg-[#c29b46]";
      const sidebarBg = "bg-[#14141d]";
      const mainBgLight = "bg-[#fcfaf8]";
      const mainBgDark = "bg-[#111118]";

      // --- NAVIGATION ---
      const navItems = [
        { id: 'dashboard', label: 'Dashboard', icon: LayoutDashboard },
        { id: 'library', label: 'Library', icon: Folder },
        { id: 'chapters', label: 'Chapters', icon: BookOpen },
        { id: 'write', label: 'Write', icon: PenTool },
        { id: 'workshop', label: 'Workshop', icon: MessageSquare },
        { id: 'transcripts', label: 'Transcripts', icon: FileText },
        { id: 'notes', label: 'Notes', icon: StickyNote },
        { id: 'timeline', label: 'Timeline', icon: Clock },
      ];

      // --- GEMINI API UTILITIES ---
      const callGemini = async (endpoint, payload) => {
        const apiKey = ""; 
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${endpoint}?key=${apiKey}`;
        let retries = 5;
        let delay = 1000;

        while (retries > 0) {
          try {
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error('API Error');
            return await response.json();
          } catch (error) {
            retries--;
            if (retries === 0) throw error;
            await new Promise(r => setTimeout(r, delay));
            delay *= 2;
          }
        }
      };

      const generateGeminiText = async (prompt, systemInstruction = "", responseFormat = "text/plain") => {
        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: {}
        };
        if (systemInstruction) {
          payload.systemInstruction = { parts: [{ text: systemInstruction }] };
        }
        if (responseFormat === "application/json") {
          payload.generationConfig.responseMimeType = "application/json";
        }

        const data = await callGemini('gemini-2.5-flash-preview-09-2025:generateContent', payload);
        return data.candidates?.[0]?.content?.parts?.[0]?.text;
      };

      // --- DASHBOARD HUB HANDLERS ---
      const handleGenerateInsights = async () => {
        if (!dashboardContext.trim()) return;
        setIsGeneratingInsights(true);
        setApiError('');
        try {
          const prompt = `Analyze this text/premise: "${dashboardContext}". Return a JSON object with strictly these keys: 
          "themes" (an array of 3 distinct core theme strings), 
          "tone" (a string describing the overall emotional tone), 
          "comps" (a string formatted exactly like "X meets Y" using well-known books/movies), 
          "readability" (a short string like "Grade 8, Medium Complexity").`;
          
          const rawResult = await generateGeminiText(prompt, "", "application/json");
          const parsed = JSON.parse(rawResult);
          setDeepInsights(parsed);
        } catch (err) { 
          setApiError('Analysis failed. Try adjusting your context.'); 
          console.error(err);
        } finally { 
          setIsGeneratingInsights(false); 
        }
      };

      const handleGenerateAdvancedTitles = async () => {
        if (!dashboardContext.trim()) return;
        setIsGeneratingTitles(true);
        setApiError('');
        try {
          const prompt = `Based on this context: "${dashboardContext}". The desired style/vibe is: ${titleStyle}.
          Return a JSON object with strictly these keys:
          "titles" (an array of 3 objects, each with "title" (string), "subtitle" (string), and "score" (a number from 1.0 to 10.0 indicating marketability)),
          "hook" (a string: a highly gripping, 1-2 sentence opening hook line),
          "blurb" (a string: a punchy, 2-sentence micro-blurb summary).`;
          
          const rawResult = await generateGeminiText(prompt, "", "application/json");
          const parsed = JSON.parse(rawResult);
          setAdvancedTitleData(parsed);
        } catch (err) { 
          setApiError('Title generation failed.'); 
          console.error(err);
        } finally { 
          setIsGeneratingTitles(false); 
        }
      };

      // --- OTHER FEATURE HANDLERS ---
      const handleGenerateSecret = async () => {
        if (!workshopCharacter.name || !workshopCharacter.personality) return;
        setIsGeneratingSecret(true);
        setApiError('');
        try {
          const res = await generateGeminiText(`Invent a deeply compelling, dark, or emotional hidden secret/backstory for a character named ${workshopCharacter.name} with this personality: ${workshopCharacter.personality}. Keep it to 1-2 powerful sentences.`);
          setWorkshopCharacter({ ...workshopCharacter, secret: res });
        } catch (err) { setApiError('Secret generation failed.'); } finally { setIsGeneratingSecret(false); }
      };

      const handleGenerateName = async () => {
        if (!workshopCharacter.personality) return;
        setIsGeneratingName(true);
        setApiError('');
        try {
          const res = await generateGeminiText(`Suggest exactly ONE unique, fitting character name based on this personality/vibe: "${workshopCharacter.personality}". Only output the name, no quotes or extra text.`);
          setWorkshopCharacter({ ...workshopCharacter, name: res.trim() });
        } catch (err) { setApiError('Name generation failed.'); } finally { setIsGeneratingName(false); }
      };

      const handleGenerateBlurb = async (fileId, content) => {
        setIsGeneratingBlurb(fileId);
        setApiError('');
        try {
          const snippet = content.substring(0, 8000); // Send first chunk
          const res = await generateGeminiText(`Act as a professional marketing copywriter. Write a gripping, 1-2 paragraph back-cover blurb (synopsis) based on the following manuscript excerpt. Make it dramatic and compelling:\n\n${snippet}`);
          setFileBlurbs(prev => ({ ...prev, [fileId]: res }));
        } catch (err) { setApiError('Blurb generation failed.'); } finally { setIsGeneratingBlurb(null); }
      };

      const handleGenerateImage = async () => {
        if (!editorText.trim()) return;
        setIsGeneratingImage(true);
        setApiError('');
        try {
          const prompt = `A cinematic, painterly concept art piece based on this story scene: ${editorText.substring(0, 500)}. Dark atmospheric lighting, high detail, masterpiece.`;
          const data = await callGemini('imagen-4.0-generate-001:predict', {
            instances: { prompt },
            parameters: { sampleCount: 1 }
          });
          const imageUrl = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
          setGeneratedImage(imageUrl);
        } catch (err) { setApiError('Image generation failed.'); } finally { setIsGeneratingImage(false); }
      };

      const handleTTS = async () => {
        if (!editorText.trim() || isSpeaking) return;
        setIsSpeaking(true);
        setApiError('');
        try {
          const data = await callGemini('gemini-2.5-flash-preview-tts:generateContent', {
            model: "gemini-2.5-flash-preview-tts",
            contents: [{ parts: [{ text: editorText.substring(0, 1000) }] }],
            generationConfig: {
              responseModalities: ["AUDIO"],
              speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
            }
          });

          const pcmBase64 = data.candidates[0].content.parts[0].inlineData.data;
          const mimeType = data.candidates[0].content.parts[0].inlineData.mimeType;
          const sampleRate = parseInt(mimeType.match(/rate=(\d+)/)?.[1] || "24000");

          const pcmData = Uint8Array.from(atob(pcmBase64), c => c.charCodeAt(0));
          const wavHeader = new ArrayBuffer(44);
          const view = new DataView(wavHeader);
          const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
          writeString(0, 'RIFF');
          view.setUint32(4, 36 + pcmData.length, true);
          writeString(8, 'WAVE');
          writeString(12, 'fmt ');
          view.setUint32(16, 16, true);
          view.setUint16(20, 1, true);
          view.setUint16(22, 1, true);
          view.setUint32(24, sampleRate, true);
          view.setUint32(28, sampleRate * 2, true);
          view.setUint16(32, 2, true);
          view.setUint16(34, 16, true);
          writeString(36, 'data');
          view.setUint32(40, pcmData.length, true);

          const blob = new Blob([wavHeader, pcmData], { type: 'audio/wav' });
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);
          audioRef.current = audio;
          audio.onended = () => setIsSpeaking(false);
          audio.play();
        } catch (err) { setApiError('Narration failed.'); setIsSpeaking(false); }
      };

      const handleWorkshopChat = async (e) => {
        e.preventDefault();
        if (!userInput.trim() || !workshopCharacter.name) return;
        
        const newMessages = [...workshopMessages, { role: 'user', content: userInput }];
        setWorkshopMessages(newMessages);
        setUserInput('');
        setIsWorkshopLoading(true);

        try {
          let systemPrompt = `You are a fictional character named ${workshopCharacter.name}. Personality: ${workshopCharacter.personality}. Stay strictly in character. If the user asks who you are, answer as the character. Keep responses brief and atmospheric.`;
          if (workshopCharacter.secret) {
            systemPrompt += `\nCRITICAL INSTRUCTION: You have a hidden secret: "${workshopCharacter.secret}". Do not reveal this secret directly unless the user pushes hard or asks specifically about it, but let it deeply influence your tone, hesitations, and word choices.`;
          }
          const response = await generateGeminiText(userInput, systemPrompt);
          setWorkshopMessages([...newMessages, { role: 'character', content: response }]);
        } catch (err) { setApiError('Workshop connection failed.'); } finally { setIsWorkshopLoading(false); }
      };

      const handleAIContinue = async () => {
        if (!editorText.trim()) return;
        setIsWriting(true);
        try {
          const prompt = `Continue this story for 2 paragraphs. Tone: atmospheric. Story so far:\n${editorText}`;
          const res = await generateGeminiText(prompt);
          setEditorText(prev => prev + "\n\n" + res);
        } catch (err) { setApiError('Continuation failed.'); } finally { setIsWriting(false); }
      };

      const handleRewrite = async (style) => {
        if (!editorText.trim()) return;
        setIsWriting(true);
        setShowRewriteMenu(false);
        try {
          let prompt = `Rewrite the following text to ${style}. Only output the text.\n\n${editorText}`;
          if (style === "Show, Don't Tell") {
            prompt = `Rewrite the following text using the "Show, Don't Tell" principle. Focus on sensory details, actions, and emotions rather than stating facts directly. Only output the text.\n\n${editorText}`;
          } else if (style === "Add Sensory Details") {
            prompt = `Rewrite the following text to naturally integrate rich sensory details (sight, sound, smell, touch, taste) to make the scene deeply immersive. Only output the text.\n\n${editorText}`;
          }
          const res = await generateGeminiText(prompt);
          setEditorText(res);
        } catch (err) { setApiError('Rewrite failed.'); } finally { setIsWriting(false); }
      };

      const handleExtractLore = async () => {
        if (!transcriptText.trim()) return;
        setIsExtracting(true);
        try {
          const res = await generateGeminiText(`Extract Characters, Locations, and Concepts from this text as bullets:\n\n${transcriptText}`);
          setNotes([{ id: Date.now(), content: res, tag: 'research' }, ...notes]);
          setTranscriptText('');
          setActiveTab('notes');
        } catch (err) { setApiError('Extraction failed.'); } finally { setIsExtracting(false); }
      };

      const handleBrainstormNote = async () => {
        setIsBrainstorming(true);
        try {
          const idea = await generateGeminiText("Generate a unique novel plot twist in one paragraph. No markdown.");
          setNotes([{ id: Date.now(), content: idea, tag: 'idea' }, ...notes]);
        } catch (err) { setApiError('Brainstorming failed.'); } finally { setIsBrainstorming(false); }
      };

      const handleCritique = async () => {
        if (!editorText.trim()) return;
        setIsCritiquing(true);
        setCritiqueResult('');
        setApiError('');
        try {
          const res = await generateGeminiText(`Act as an expert fiction editor. Critique the following text, focusing on pacing, tone, and character voice. Provide 3 short, punchy bullet points of constructive feedback. No markdown formatting other than bullets:\n\n${editorText}`);
          setCritiqueResult(res);
        } catch (err) { setApiError('Critique failed.'); } finally { setIsCritiquing(false); }
      };

      const handleGenerateChapters = async () => {
        if (!chapterInput.trim()) return;
        setIsGeneratingChapters(true);
        setApiError('');
        try {
          const res = await generateGeminiText(`Create a 5-chapter outline for a book based on this premise: ${chapterInput}. Keep it concise and use bullet points.`);
          setChaptersOutline(res);
        } catch (err) { setApiError('Outline generation failed.'); } finally { setIsGeneratingChapters(false); }
      };

      const handleGenerateTimeline = async () => {
        if (!timelineInput.trim()) return;
        setIsGeneratingTimeline(true);
        setApiError('');
        try {
          const res = await generateGeminiText(`Create a chronologically ordered bulleted timeline based on this story summary: ${timelineInput}. Focus on major plot beats.`);
          setTimelineResult(res);
        } catch (err) { setApiError('Timeline generation failed.'); } finally { setIsGeneratingTimeline(false); }
      };

              <div className="w-8 h-8 rounded-full bg-[#c29b46] flex items-center justify-center text-white font-bold shadow-inner">{workshopCharacter.name?.[0] || '?'}</div>
              <span className="font-serif font-medium text-slate-700 dark:text-slate-300">{workshopCharacter.name || 'Unknown Character'}</span>
            </div>

            <div className="flex-1 p-6 overflow-y-auto space-y-4">
              {workshopMessages.length === 0 && (
                <div className="h-full flex flex-col items-center justify-center text-center opacity-50">
                  <MessageSquare className="w-12 h-12 mb-4 text-slate-400" />
                  <p className="text-sm italic text-slate-500">Start an interview with your character to hear their voice.</p>
                </div>
              )}
              {workshopMessages.map((msg, i) => (
                <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                  <div className={`max-w-[80%] p-4 rounded-2xl text-sm leading-relaxed ${
                    msg.role === 'user' ? 'bg-[#c29b46] text-white rounded-tr-none shadow-sm' : 'bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-200 rounded-tl-none border border-slate-200 dark:border-slate-700 shadow-sm'
                  }`}>
                    {msg.content}
                  </div>
                </div>
              ))}
              {isWorkshopLoading && <div className="flex gap-2 items-center text-slate-400 text-xs italic"><Loader2 className="w-3 h-3 animate-spin" /> {workshopCharacter.name} is thinking...</div>}
            </div>

            <form onSubmit={handleWorkshopChat} className="p-4 bg-slate-50 dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800">
              <input 
                value={userInput}
                onChange={e => setUserInput(e.target.value)}
                disabled={!workshopCharacter.name}
                placeholder={workshopCharacter.name ? `Talk to ${workshopCharacter.name}...` : "Set a character name first"}
                className="w-full bg-white dark:bg-[#181824] border border-slate-200 dark:border-slate-800 p-4 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-[#c29b46]/50 shadow-inner text-slate-800 dark:text-slate-200"
              />
            </form>
          </div>
        </div>
      );

      const renderTranscripts = () => (
        <div className="max-w-3xl mx-auto px-8 py-12 flex flex-col h-full animate-in fade-in duration-500">
          <h1 className="text-4xl font-serif mb-8 text-slate-800 dark:text-slate-100">Transcripts</h1>
          <textarea 
            value={transcriptText} 
            onChange={e => setTranscriptText(e.target.value)} 
            placeholder="Paste interview text here..."
            className="flex-1 w-full bg-white dark:bg-[#181824] border border-slate-200 dark:border-slate-800 rounded-3xl p-8 focus:outline-none focus:ring-2 focus:ring-[#c29b46]/50 shadow-inner mb-6 text-slate-800 dark:text-slate-200 resize-none"
          />
          <button onClick={handleExtractLore} className={`${bgGold} text-white px-6 py-4 rounded-2xl font-medium flex items-center justify-center gap-2 hover:bg-[#b08b3e] transition-colors`}>
            {isExtracting ? <Loader2 className="animate-spin w-5 h-5" /> : <DatabaseZap className="w-5 h-5" />} ✨ Extract Lore to Notes
          </button>
        </div>
      );

      const renderNotes = () => (
        <div className="max-w-3xl mx-auto px-8 py-12 animate-in fade-in duration-500">
          <div className="flex justify-between items-end mb-8">
            <h1 className="text-4xl font-serif text-slate-800 dark:text-slate-100">Notes</h1>
            <button onClick={handleBrainstormNote} className="bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 px-4 py-2 rounded-lg text-sm flex items-center gap-2 hover:bg-indigo-100 dark:hover:bg-indigo-900/40 transition-colors font-medium">
              {isBrainstorming ? <Loader2 className="animate-spin w-4 h-4" /> : <Sparkles className="w-4 h-4" />} ✨ Brainstorm Idea
            </button>
          </div>
          <div className="grid grid-cols-2 gap-4">
            {notes.map(note => (
              <div key={note.id} className="p-6 rounded-2xl bg-white dark:bg-[#181824] border border-slate-200 dark:border-slate-800 shadow-sm relative group hover:border-[#c29b46] transition-colors">
                <span className="text-[10px] font-bold uppercase text-[#c29b46] mb-2 block">{note.tag}</span>
                <p className="text-sm leading-relaxed text-slate-700 dark:text-slate-300 whitespace-pre-wrap">{note.content}</p>
                <button 
                  onClick={() => setNotes(notes.filter(n => n.id !== note.id))}
                  className="absolute top-4 right-4 text-slate-400 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity bg-white dark:bg-[#181824] rounded-full p-1"
                >×</button>
              </div>
            ))}
          </div>
        </div>
      );

      const renderTimeline = () => (
        <div className="max-w-3xl mx-auto px-8 py-12 flex flex-col h-full animate-in fade-in duration-500">
          <h1 className="text-4xl font-serif mb-8 text-slate-800 dark:text-slate-100">Story Timeline Builder</h1>
          <textarea 
            value={timelineInput} 
            onChange={e => setTimelineInput(e.target.value)} 
            placeholder="Paste your story summary or rough sequence of events here..."
            className="h-32 bg-white dark:bg-[#181824] border border-slate-200 dark:border-slate-800 rounded-3xl p-6 focus:outline-none focus:ring-2 focus:ring-[#c29b46]/50 shadow-inner mb-4 text-slate-800 dark:text-slate-200 resize-none"
          />
          <button onClick={handleGenerateTimeline} disabled={isGeneratingTimeline || !timelineInput.trim()} className={`${bgGold} text-white px-6 py-4 rounded-2xl font-medium flex items-center justify-center gap-2 hover:bg-[#b08b3e] transition-colors disabled:opacity-50 mb-8 self-start shadow-sm`}>
            {isGeneratingTimeline ? <Loader2 className="animate-spin w-5 h-5" /> : <GitCommit className="w-5 h-5" />} ✨ Generate Chronology
          </button>
          
          {timelineResult && (
            <div className="flex-1 overflow-y-auto relative pl-8 before:absolute before:inset-y-0 before:left-4 before:w-px before:bg-slate-200 dark:before:bg-slate-700 pb-8">
              <h3 className="text-lg font-bold uppercase tracking-widest text-[#c29b46] mb-6 relative before:absolute before:w-3 before:h-3 before:bg-[#c29b46] before:rounded-full before:-left-[1.35rem] before:top-1.5">Chronological Events</h3>
              <div className="text-sm leading-loose text-slate-700 dark:text-slate-300 whitespace-pre-wrap">{timelineResult}</div>
            </div>
          )}
        </div>
      );

      return (
        <div className={`flex h-screen overflow-hidden font-sans ${isDarkMode ? 'dark' : ''}`}>
          {/* Sidebar */}
          <div className={`${sidebarBg} w-64 flex flex-col shrink-0 text-slate-300 transition-colors duration-300`}>
            <div className="p-8 pb-10">
              <p className="text-[10px] tracking-[0.2em] font-semibold text-slate-500 mb-1">AS ABOVE</p>
              <h2 className={`text-2xl font-serif ${gold} mb-2`}>So Below</h2>
            </div>
            <nav className="flex-1 px-4 space-y-1 overflow-y-auto">
              {navItems.map((item) => (
                <button
                  key={item.id}
                  onClick={() => setActiveTab(item.id)}
                  className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl text-sm font-medium transition-all duration-200
                    ${activeTab === item.id ? `bg-[#242433] ${gold} shadow-inner` : 'text-slate-400 hover:text-slate-200 hover:bg-white/5'}`}
                >
                  <item.icon className={`w-5 h-5 ${activeTab === item.id ? gold : 'text-slate-500'}`} />
                  {item.label}
                </button>
              ))}
            </nav>
            <div className="p-6 border-t border-white/5">
              <button onClick={() => setIsDarkMode(!isDarkMode)} className="flex items-center gap-3 text-sm text-slate-500 hover:text-slate-300 transition-colors w-full p-2 rounded-lg hover:bg-white/5">
                {isDarkMode ? <Sun className="w-4 h-4" /> : <Moon className="w-4 h-4" />}
                {isDarkMode ? 'Light mode' : 'Dark mode'}
              </button>
            </div>
          </div>

          {/* Main Content */}
          <div className={`flex-1 flex flex-col overflow-hidden transition-colors duration-300 ${isDarkMode ? mainBgDark : mainBgLight}`}>
            {apiError && <div className="bg-rose-50 dark:bg-rose-900/20 border-b border-rose-100 dark:border-rose-900 p-3 text-center text-rose-600 dark:text-rose-400 text-sm flex items-center justify-center gap-2"><AlertCircle className="w-4 h-4" /> {apiError}</div>}
            
            <div className="flex-1 overflow-y-auto">
              {activeTab === 'dashboard' && renderDashboard()}
              {activeTab === 'library' && renderLibrary()}
              {activeTab === 'chapters' && renderChapters()}
              {activeTab === 'write' && renderWrite()}
              {activeTab === 'workshop' && renderWorkshop()}
              {activeTab === 'transcripts' && renderTranscripts()}
              {activeTab === 'notes' && renderNotes()}
              {activeTab === 'timeline' && renderTimeline()}
            </div>
          </div>
        </div>
      );
    }

    // Initialize React
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BookStudio />);
  </script>
</body>
</html>
